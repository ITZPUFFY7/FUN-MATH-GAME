<!DOCTYPE html>
<html>
<head>
<title>Ultimate Math Challenge</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

#game{
margin-top:50px;
}

button{
padding:10px 20px;
font-size:18px;
margin:10px;
}

input{
font-size:20px;
padding:5px;
width:200px;
text-align:center;
}

#progress{
width:400px;
height:20px;
background:#333;
margin:auto;
border-radius:10px;
overflow:hidden;
}

#bar{
height:100%;
width:0%;
background:lime;
}
</style>
</head>

<body>

<h1>Ultimate Math Challenge</h1>

<div>
<button onclick="startEndless()">Endless Mode</button>
<button onclick="startQuiz()">Quiz Mode</button>

<label>
<input type="checkbox" id="hardcore"> Hardcore Mode
</label>
</div>

<div id="game" style="display:none;">

<h2 id="mode"></h2>

<div id="progress">
<div id="bar"></div>
</div>

<h3 id="question"></h3>

<input id="answer" type="text">

<br>

<button onclick="submitAnswer()">Submit</button>
<button onclick="giveUp()">Give Up</button>

<p id="info"></p>

</div>

<script>

let mode=""
let q=1
let correct=0
let answers=[]
let hardcore=false

function startEndless(){
mode="endless"
startGame()
}

function startQuiz(){
mode="quiz"
startGame()
}

function startGame(){

hardcore=document.getElementById("hardcore").checked

q=1
correct=0
answers=[]

document.getElementById("game").style.display="block"
document.getElementById("mode").innerText=mode.toUpperCase()

generateQuestion()
updateInfo()

}

function generateQuestion(){

let question=""
let answer=0

// basic math

if(q<5){

let a=rand(1,10)
let b=rand(1,10)

question=`${a} + ${b}`
answer=a+b

}

else if(q<10){

let a=rand(10,30)
let b=rand(1,10)

question=`${a} - ${b}`
answer=a-b

}

else if(q<15){

let a=rand(2,10)
let b=rand(2,10)

question=`${a} × ${b}`
answer=a*b

}

// algebra

else if(q<25){

let a=rand(1,10)
let b=rand(1,20)

question=`Solve for x: x + ${a} = ${b}`
answer=b-a

}

else if(q<35){

let a=rand(1,10)
let b=rand(1,20)

question=`Solve: ${a}x = ${b}`
answer=b/a

}

// calculus mix

else if(q<45){

let type=rand(1,2)

if(type===1){

let a=rand(2,10)

question=`Derivative of x^${a}`
answer=`${a}x^${a-1}`

}else{

let m=rand(1,10)
let x=rand(1,10)

question=`Slope of y=${m}x at x=${x}`
answer=m

}

}

// integrals

else if(q<100){

let a=rand(1,10)

question=`Integral of ${a}x`
answer=`${a/2}x^2 + C`

}

// quantum

else if(q<200){

let denom=[2,3,4,5][rand(0,3)]

question=`If amplitude = 1/√${denom}, what is probability?`
answer=(1/denom)

}

// eigenvalues

else if(q<500){

let a=rand(1,5)
let b=rand(1,5)

let matrix=`[[${a},${b}],[${b},${a}]]`

let eigen=a+b

question=`Largest eigenvalue of ${matrix}`
answer=eigen

}

// insane arithmetic

else{

let base=(Math.random()*2000).toFixed(4)
let power=(Math.random()*100).toFixed(2)

question=`${base}^${power}`

answer=Math.pow(base,power)

answer=Number(answer).toExponential(3)

}

answers[q]=answer

document.getElementById("question").innerText=`Q${q}: ${question}`

document.getElementById("answer").value=""
document.getElementById("answer").focus()

updateProgress()

}

function submitAnswer(){

let user=document.getElementById("answer").value.trim()
let correctAnswer=answers[q]

// numeric comparison

if(!isNaN(user) && !isNaN(correctAnswer)){

let u=parseFloat(user)
let a=parseFloat(correctAnswer)

if(Math.abs(u-a)/Math.abs(a) < 0.05){

correct++
q++
generateQuestion()
updateInfo()
return

}

}

// text comparison

if(user.toLowerCase()===String(correctAnswer).toLowerCase()){

correct++
q++
generateQuestion()

}

else{

if(hardcore){

if(mode==="endless"){
alert("Hardcore failure. Game over.")
giveUp()
return
}

if(mode==="quiz"){
correct=0
alert("Hardcore wrong! Score reset!")
}

}

q++
generateQuestion()

}

updateInfo()

}

function giveUp(){

if(mode==="endless"){
alert(`You reached question ${q}\nCorrect: ${correct}`)
}

else{
finishQuiz()
}

}

function finishQuiz(){

let percent=((correct/500)*100).toFixed(1)

alert(`Quiz finished\nScore: ${correct}/500\n${percent}%`)

}

function updateInfo(){

document.getElementById("info").innerText=
`Question: ${q} | Correct: ${correct}`

}

function updateProgress(){

if(mode==="quiz"){
let percent=(q/500)*100
document.getElementById("bar").style.width=percent+"%"
}

}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

// enter submit

document.getElementById("answer").addEventListener("keydown",function(e){
if(e.key==="Enter"){
submitAnswer()
}
})

// arrow navigation

document.addEventListener("keydown",function(e){

if(hardcore) return

if(e.key==="ArrowLeft"){
if(q>1) q--
generateQuestion()
}

if(e.key==="ArrowRight"){
q++
generateQuestion()
}

})

</script>

</body>
</html>
